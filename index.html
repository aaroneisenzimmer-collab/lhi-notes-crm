<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud CRM - Live Sync & Email</title>
    <style>
        :root { --bg: #f4f7f6; --text: #333; --card: #fff; --primary: #2ecc71; --gray: #888; }
        .dark-mode { --bg: #1a1a1a; --text: #f4f7f6; --card: #2d2d2d; --primary: #27ae60; --gray: #aaa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background 0.3s, color 0.3s; }
        .container { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 520px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; background: var(--card); color: var(--text); font-size: 1rem; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 12px 0 4px; transition: all 0.2s; }
        .btn-save { background: var(--primary); color: white; font-size: 1.1rem; }
        .btn-save:hover { opacity: 0.92; transform: translateY(-1px); }
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 520px; }
        .tab { flex: 1; padding: 12px; cursor: pointer; background: #ddd; border-radius: 8px; text-align: center; border: none; font-weight: 500; transition: all 0.2s; }
        .tab.active { background: var(--primary); color: white; }
        .page { display: none; }
        .page.active { display: block; }
        .status-box { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding: 10px; background: rgba(0,0,0,0.04); border-radius: 8px; }
        #statusLight { width: 14px; height: 14px; border-radius: 50%; background: #bbb; border: 2px solid #999; flex-shrink: 0; }
        #saveMessage { text-align: center; margin-top: 8px; font-weight: 500; color: var(--primary); opacity: 0; transition: opacity 0.4s; }
        #saveMessage.show { opacity: 1; }
    </style>
</head>
<body>
    <button onclick="document.body.classList.toggle('dark-mode')" style="margin-bottom:20px; cursor:pointer; padding:10px 16px; font-size:1.1rem;">
        🌓 Toggle Theme
    </button>

    <div class="tab-container">
        <button class="tab active" onclick="showPage('form')">New Entry</button>
        <button class="tab" onclick="showPage('search')">Global Search</button>
    </div>

    <div id="formPage" class="page active">
        <div class="container">
            <h2>Cloud CRM Command</h2>
            <div class="status-box">
                <div id="statusLight"></div>
                <span id="statusText" style="font-weight:500;">Connecting to Google Sheets...</span>
            </div>
            <input type="text" id="name" list="contactOptions" placeholder="Contact Name (type to search previous)" autocomplete="off">
            <datalist id="contactOptions"></datalist>
            <input type="text" id="company" placeholder="Company">
            <input type="email" id="email" placeholder="Email Address">
            <input type="tel" id="phone" placeholder="Phone">
            <input type="text" id="location" placeholder="City, State">
            <select id="priority">
                <option value="Medium">Priority: Medium</option>
                <option value="Low">Priority: Low</option>
                <option value="High">Priority: High</option>
            </select>
            <input type="text" id="topic" placeholder="Topic">
            <textarea id="noteContent" rows="4" placeholder="Notes from this interaction..."></textarea>
            <button class="btn btn-save" onclick="saveData()">💾 Save & Sync to Cloud</button>
            <div id="saveMessage">Saved successfully</div>
        </div>
    </div>

    <div id="searchPage" class="page">
        <div class="container">
            <h2>Global Search</h2>
            <p style="color:var(--gray); text-align:center; margin-top:40px;">
                Full cloud search coming soon
            </p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZC482fVsh_ri6ya2RyxKmFNEqmADNUF2flMQsKWl3CcedtYQt6a27iDRClcGTMvS4nA/exec";

        let contacts = [];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const page = document.getElementById(pageId + 'Page');
            if (page) page.classList.add('active');
            const activeTab = Array.from(document.querySelectorAll('.tab'))
                .find(t => t.textContent.trim() === (pageId === 'form' ? 'New Entry' : 'Global Search'));
            if (activeTab) activeTab.classList.add('active');
        }

        async function loadAndCheckConnection() {
            const light = document.getElementById('statusLight');
            const text  = document.getElementById('statusText');
            if (!light || !text) return;

            light.style.background = '#f1c40f';
            text.textContent = 'Connecting...';
            text.style.color = '#f39c12';

            try {
                const res = await fetch(SCRIPT_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                contacts = await res.json();

                light.style.background = '#2ecc71';
                text.textContent = `Connected (${contacts.length} contact${contacts.length === 1 ? '' : 's'})`;
                text.style.color = '#27ae60';

                updateDatalist();
            } catch (err) {
                console.error('Load failed:', err);
                light.style.background = '#e74c3c';
                text.textContent = 'Connection failed';
                text.style.color = '#c0392b';
            }
        }

        function updateDatalist() {
            const dl = document.getElementById('contactOptions');
            if (!dl) return;
            dl.innerHTML = contacts
                .map(c => `<option value="${c.name.replace(/"/g,'&quot;')}">`)
                .join('');
        }

        document.getElementById('name').addEventListener('input', function() {
            const entered = this.value.trim();
            const match = contacts.find(c => c.name.toLowerCase() === entered.toLowerCase());
            if (match) {
                document.getElementById('company').value = match.company || '';
                document.getElementById('email').value   = match.email   || '';
                document.getElementById('phone').value   = match.phone   || '';
                document.getElementById('location').value = match.location || '';
            }
        });

        async function saveData() {
            const btn = document.querySelector('.btn-save');
            const saveMsg = document.getElementById('saveMessage');
            const payload = {
                name: document.getElementById('name').value?.trim() || '',
                company: document.getElementById('company').value?.trim() || '',
                email: document.getElementById('email').value?.trim() || '',
                phone: document.getElementById('phone').value?.trim() || '',
                location: document.getElementById('location').value?.trim() || '',
                priority: document.getElementById('priority').value || 'Medium',
                topic: document.getElementById('topic').value?.trim() || '',
                noteContent: document.getElementById('noteContent').value?.trim() || ''
            };

            if (!payload.name) {
                alert("Please enter a contact name");
                return;
            }

            btn.textContent = "⏳ Syncing...";
            btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(payload)
                });

                saveMsg.textContent = "Saved successfully";
                saveMsg.classList.add('show');
                setTimeout(() => saveMsg.classList.remove('show'), 3000);

                setTimeout(loadAndCheckConnection, 2000);
            } catch (err) {
                console.error('Save failed:', err);
                saveMsg.textContent = "Save failed";
                saveMsg.style.color = '#e74c3c';
                saveMsg.classList.add('show');
                setTimeout(() => {
                    saveMsg.classList.remove('show');
                    saveMsg.style.color = '';
                }, 4000);
            } finally {
                btn.textContent = "💾 Save & Sync to Cloud";
                btn.disabled = false;
            }
        }

        window.addEventListener('load', loadAndCheckConnection);
    </script>
</body>
</html>
